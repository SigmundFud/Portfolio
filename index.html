<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jason Mollink — Director</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --red-bright: #ff2e00;
      /* Changed "dim" red to a lighter, softer red */
      --red-light: #ff7a5c; 
      /* This is the size for "Director" and all other body text */
      --text-large: clamp(1.5rem, 4vw, 2.5rem); 
    }

    body {
      background: var(--bg);
      color: var(--red-light);
      font-family: 'Share Tech Mono', monospace;
      font-size: var(--text-large);
      line-height: 1.4;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 80px; /* Large spacing between items */
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Scanline effect */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none;
      z-index: 999;
    }

    a { color: var(--red-light); text-decoration: none; border-bottom: 2px solid var(--red-light); }
    a:hover { color: var(--red-bright); border-color: var(--red-bright); }

    /* ── Header ── */
    header { border-bottom: 2px solid #1a1a1a; padding-bottom: 40px; }
    
    .name {
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 0.9;
      color: var(--red-bright);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: var(--text-large);
      color: var(--red-bright);
      font-weight: bold;
    }

    /* ── Content Blocks ── */
    .content-block { width: 100%; display: flex; flex-direction: column; gap: 20px; }
    
    .label { font-size: 14px; color: #444; text-transform: uppercase; letter-spacing: 2px; }
